name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: pip wheel . --wheel-dir dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.whl
